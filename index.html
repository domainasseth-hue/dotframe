<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dotframe — Braille dot art engine</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --border: #262c33;
    --text: #d7dde3;
    --dim: #7c8792;
    --accent: #5ee6a8;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  h1 { font-size: 15px; font-weight: 600; }
  h1 .dot { color: var(--accent); }
  .spacer { flex: 1; }
  button, label.btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover, label.btn:hover { border-color: var(--accent); color: var(--accent); }
  input[type="file"] { display: none; }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--dim);
    font-size: 12px;
  }
  .controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .controls input[type="range"] { width: 110px; accent-color: var(--accent); }
  .controls input[type="checkbox"] { accent-color: var(--accent); }
  .controls .val { color: var(--text); min-width: 3ch; text-align: right; }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 12px;
  }
  #out {
    color: #b8bfc6;
    white-space: pre;
    user-select: text;
  }
  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 6px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  #dropHint {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    pointer-events: none;
  }
  body.dragging main { outline: 2px dashed var(--accent); outline-offset: -8px; }
  body.dragging #dropHint { color: var(--accent); }
  #toast {
    position: fixed;
    top: 14px; right: 14px;
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>dotframe<span class="dot">⠿</span></h1>
  <span class="spacer"></span>
  <label class="btn">open file<input type="file" id="file" accept="image/*,video/*"></label>
  <button id="webcam">webcam</button>
  <button id="demo">demo</button>
  <button id="copy">copy frame</button>
  <button id="toggle">pause</button>
</header>

<div class="controls">
  <label>width <input type="range" id="width" min="40" max="200" value="100" step="4"><span class="val" id="widthVal">100</span></label>
  <label>threshold <input type="range" id="threshold" min="0" max="255" value="128"><span class="val" id="thresholdVal">128</span></label>
  <label><input type="checkbox" id="dither" checked> dither</label>
  <label><input type="checkbox" id="invert"> invert</label>
  <label>tint <select id="tint">
    <option value="#b8bfc6" selected>grey</option>
    <option value="#5ee6a8">green</option>
    <option value="#ffc266">amber</option>
    <option value="#f2f5f7">white</option>
  </select></label>
  <label><input type="checkbox" id="color"> color</label>
</div>

<main id="stage">
  <pre id="out"></pre>
  <div id="dropHint">drag &amp; drop any image, GIF, or video anywhere</div>
</main>

<div id="toast"></div>

<script src="dotframe.js"></script>
<script>
(function () {
  var out = document.getElementById('out');
  var stage = document.getElementById('stage');
  var df = null;
  var currentSource = null;
  var currentURL = null;
  var playing = true;

  // --- built-in demo: plasma rendered to a hidden canvas -------------------
  var demoCanvas = document.createElement('canvas');
  demoCanvas.width = 200;
  demoCanvas.height = 120;
  var demoCtx = demoCanvas.getContext('2d');
  var demoImg = demoCtx.createImageData(200, 120);
  var demoRAF = 0;

  function plasma(now) {
    var t = now / 900;
    var d = demoImg.data;
    var w = 200, h = 120, i = 0;
    for (var y = 0; y < h; y++) {
      for (var x = 0; x < w; x++) {
        var v = Math.sin(x / 14 + t)
              + Math.sin(y / 9 - t * 0.7)
              + Math.sin((x + y) / 18 + t * 1.3)
              + Math.sin(Math.sqrt((x - w / 2) * (x - w / 2) + (y - h / 2) * (y - h / 2)) / 9 - t);
        var g = Math.floor((v + 4) / 8 * 255);
        d[i] = g; d[i + 1] = g; d[i + 2] = g; d[i + 3] = 255;
        i += 4;
      }
    }
    demoCtx.putImageData(demoImg, 0, 0);
    demoRAF = requestAnimationFrame(plasma);
  }

  function stopDemo() {
    if (demoRAF) cancelAnimationFrame(demoRAF);
    demoRAF = 0;
  }

  // --- engine wiring --------------------------------------------------------
  function currentOptions() {
    return {
      width: +document.getElementById('width').value,
      threshold: +document.getElementById('threshold').value,
      dither: document.getElementById('dither').checked,
      invert: document.getElementById('invert').checked,
      color: document.getElementById('color').checked,
      onFrame: fitOnce
    };
  }

  var fitted = false;
  function fitOnce() {
    if (!fitted) { fitted = true; fitFont(); }
  }

  function fitFont() {
    if (!df || !df.cols) return;
    var availW = stage.clientWidth - 24;
    var availH = stage.clientHeight - 40;
    // monospace glyph is ~0.6em wide; line-height is 1em
    var size = Math.min(availW / (df.cols * 0.6), availH / df.rows);
    out.style.fontSize = Math.max(3, Math.floor(size * 10) / 10) + 'px';
  }

  function setSource(el) {
    if (df) df.destroy();
    if (currentSource && currentSource.srcObject) {
      currentSource.srcObject.getTracks().forEach(function (t) { t.stop(); });
    }
    if (currentURL) { URL.revokeObjectURL(currentURL); currentURL = null; }
    if (el !== demoCanvas) stopDemo();
    currentSource = el;
    fitted = false;
    df = new DotFrame(el, out, currentOptions());
    playing = true;
    document.getElementById('toggle').textContent = 'pause';
    df.start();
  }

  function startDemo() {
    stopDemo();
    demoRAF = requestAnimationFrame(plasma);
    setSource(demoCanvas);
  }

  // --- file handling --------------------------------------------------------
  function loadFile(file) {
    if (!file) return;
    var url = URL.createObjectURL(file);
    var el;
    if (file.type.indexOf('video/') === 0) {
      el = document.createElement('video');
      el.muted = true;
      el.loop = true;
      el.playsInline = true;
      el.autoplay = true;
      el.src = url;
      el.play().catch(function () {});
    } else if (file.type.indexOf('image/') === 0) {
      el = document.createElement('img');
      el.src = url;
    } else {
      toast('unsupported file type: ' + (file.type || 'unknown'));
      URL.revokeObjectURL(url);
      return;
    }
    setSource(el);
    currentURL = url;
  }

  document.getElementById('file').addEventListener('change', function (e) {
    loadFile(e.target.files[0]);
    e.target.value = '';
  });

  ['dragenter', 'dragover'].forEach(function (ev) {
    document.addEventListener(ev, function (e) {
      e.preventDefault();
      document.body.classList.add('dragging');
    });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    document.addEventListener(ev, function (e) {
      e.preventDefault();
      if (ev === 'drop' || e.target === document.documentElement) {
        document.body.classList.remove('dragging');
      }
      if (ev === 'drop') loadFile(e.dataTransfer.files[0]);
    });
  });

  // --- buttons --------------------------------------------------------------
  document.getElementById('demo').addEventListener('click', startDemo);

  document.getElementById('webcam').addEventListener('click', function () {
    navigator.mediaDevices.getUserMedia({ video: true }).then(function (stream) {
      var v = document.createElement('video');
      v.muted = true;
      v.playsInline = true;
      v.srcObject = stream;
      v.play();
      setSource(v);
    }).catch(function () { toast('webcam unavailable'); });
  });

  document.getElementById('copy').addEventListener('click', function () {
    if (!df) return;
    navigator.clipboard.writeText(df.snapshot()).then(function () {
      toast('frame copied');
    }, function () { toast('copy failed'); });
  });

  document.getElementById('toggle').addEventListener('click', function () {
    if (!df) return;
    playing = !playing;
    if (playing) df.start(); else df.stop();
    this.textContent = playing ? 'pause' : 'play';
  });

  // --- controls -------------------------------------------------------------
  function bindControl(id, key, isCheckbox) {
    var el = document.getElementById(id);
    el.addEventListener('input', function () {
      var value = isCheckbox ? el.checked : +el.value;
      var valEl = document.getElementById(id + 'Val');
      if (valEl) valEl.textContent = value;
      if (df) {
        var o = {};
        o[key] = value;
        df.setOptions(o);
        if (key === 'width') fitFont();
      }
    });
  }
  bindControl('width', 'width');
  bindControl('threshold', 'threshold');
  bindControl('dither', 'dither', true);
  bindControl('invert', 'invert', true);
  bindControl('color', 'color', true);

  document.getElementById('tint').addEventListener('input', function () {
    out.style.color = this.value;
  });

  window.addEventListener('resize', fitFont);

  // --- toast ----------------------------------------------------------------
  var toastTimer = 0;
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 1600);
  }

  startDemo();
})();
</script>
</body>
</html>
